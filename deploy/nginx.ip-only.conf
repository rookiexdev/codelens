# CodeLens reverse proxy — IP-only, no domain, plain HTTP (no TLS).
#
# Use this ONLY if you have no domain and don't want free HTTPS via nip.io.
# Everything is served from ONE port (80) on your public IP:
#   http://<PUBLIC_IP>/       -> Next.js web (127.0.0.1:3000)
#   http://<PUBLIC_IP>/api/   -> NestJS api  (127.0.0.1:3001)   [/api prefix stripped]
#
# Because web and api share one origin, cookies/CORS work over plain HTTP.
#
# Matching env changes:
#   apps/web/.env.production : NEXT_PUBLIC_API_URL=http://<PUBLIC_IP>/api
#   apps/api/.env            : WEB_ORIGIN=http://<PUBLIC_IP>
#                              FRONTEND_URL=http://<PUBLIC_IP>
#                              GITHUB_CALLBACK_URL=http://<PUBLIC_IP>/api/oauth/github/callback
#                              (same /api/oauth/... pattern for gitlab + bitbucket)
#
# Caveats: no encryption; browsers show "Not secure"; Bitbucket (and often
# GitLab) reject non-HTTPS OAuth callbacks, so those logins may not work.
#
# Install:
#   sudo cp deploy/nginx.ip-only.conf /etc/nginx/sites-available/codelens
#   sudo ln -sf /etc/nginx/sites-available/codelens /etc/nginx/sites-enabled/codelens
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80 default_server;
    server_name _;                 # matches any host / the raw IP

    client_max_body_size 10m;

    # API — the trailing slash on proxy_pass strips the /api/ prefix,
    # so /api/oauth/github/callback -> backend /oauth/github/callback
    location /api/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Web — everything else
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
